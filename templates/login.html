<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Login – RoadMate Pro</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
<link href="{{ url_for('static',filename='css/style.css') }}" rel="stylesheet"/>
<style>
body { min-height:100vh; display:flex; align-items:center; justify-content:center; }
.auth-wrap {
  width:100%; max-width:460px; padding:24px;
  animation: fadeUp 0.6s ease both;
}
.auth-card {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 24px;
  padding: 2.5rem;
  backdrop-filter: var(--blur);
  box-shadow: var(--shadow-3d);
  position: relative;
  overflow: hidden;
}
.auth-card::before {
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.6),transparent);
}
.auth-logo {
  font-family:'Syne',sans-serif;font-weight:800;font-size:20px;
  background:linear-gradient(135deg,#4f8ef7,#a78bfa);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:2rem;display:block;text-align:center;text-decoration:none;
}
.auth-title {
  font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:800;
  letter-spacing:-0.5px;margin-bottom:0.4rem;
}
.auth-sub { font-size:14px;color:var(--text2);margin-bottom:2rem; }
.input-group-text {
  background:var(--surface2)!important;
  border:1.5px solid var(--border)!important;
  border-right:none!important;
  color:var(--text2)!important;
  border-radius:var(--radius-sm) 0 0 var(--radius-sm)!important;
}
.input-group .form-control {
  border-left:none!important;
  border-radius:0 var(--radius-sm) var(--radius-sm) 0!important;
}
.auth-divider {
  text-align:center;color:var(--text3);font-size:13px;
  position:relative;margin:1.5rem 0;
}
.auth-divider::before,.auth-divider::after {
  content:'';position:absolute;top:50%;width:42%;height:1px;background:var(--border);
}
.auth-divider::before{left:0} .auth-divider::after{right:0}
.bg-orb {
  position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:-1;
}
</style>
</head>
<body>
<div class="bg-orb" style="width:400px;height:400px;background:rgba(79,142,247,0.1);top:-100px;right:-100px;"></div>
<div class="bg-orb" style="width:300px;height:300px;background:rgba(167,139,250,0.08);bottom:-50px;left:-50px;"></div>

<div class="auth-wrap">
  {% with msgs = get_flashed_messages(with_categories=true) %}
  {% for cat, msg in msgs %}
  <div class="alert alert-{{ cat }} mb-3">{{ msg }}</div>
  {% endfor %}
  {% endwith %}

  <div class="auth-card">
    <a href="{{ url_for('index') }}" class="auth-logo">
      <i class="bi bi-map-fill me-2"></i>RoadMate Pro
    </a>

    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub">Sign in to your account to continue planning</p>

    <form method="POST">
      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope"></i></span>
          <input type="email" name="email" class="form-control"
                 placeholder="you@example.com" required autofocus>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" name="password" class="form-control"
                 placeholder="Your password" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 py-3 fs-6 fw-bold">
        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
      </button>
    </form>

    <div class="auth-divider">or</div>

    <div class="text-center">
      <span style="font-size:14px;color:var(--text2);">Don't have an account?</span>
      <a href="{{ url_for('register') }}" style="color:var(--blue);font-weight:600;font-size:14px;text-decoration:none;margin-left:6px;">
        Create one →
      </a>
    </div>
  </div>

  <div class="text-center mt-3">
    <button onclick="toggleDark()" style="background:none;border:none;color:var(--text2);font-size:13px;cursor:pointer;">
      <i class="bi bi-moon-stars-fill" id="darkIcon" style="margin-right:6px;"></i>Toggle dark mode
    </button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
function toggleDark() {
  document.body.classList.toggle('dark-mode');
  const isDark = document.body.classList.contains('dark-mode');
  localStorage.setItem('darkMode', isDark ? '1' : '0');
  document.getElementById('darkIcon').className = isDark ? 'bi bi-sun-fill' : 'bi bi-moon-stars-fill';
}
if (localStorage.getItem('darkMode') === '1') {
  document.body.classList.add('dark-mode');
  document.getElementById('darkIcon').className = 'bi bi-sun-fill';
}
</script>
</body>
</html>
